<section class="services-section">
  <div class="container layout-grid">
    
    <!-- Left Column: Header text -->
    <div class="section-header">
      <h5 class="section-kicker">{{ 'HOME.SERVICES.KICKER' | translate }}</h5>
      <h2 class="section-title" [innerHTML]="'HOME.SERVICES.TITLE' | translate"></h2>
      <div class="divider"></div>
      <p class="section-desc">
        {{ 'HOME.SERVICES.DESC' | translate }}
      </p>
      <a href="#" class="explore-link" [innerHTML]="'HOME.SERVICES.EXPLORE_BTN' | translate"></a>
    </div>

    <!-- Right Column: Services Cards with Connecting Line -->
    <div class="services-track-container">
      
      <div class="services-grid">
        @for (service of services; track service.id) {
          <app-service-card [service]="service"></app-service-card>
        }
      </div>
    </div>

  </div>
</section>
