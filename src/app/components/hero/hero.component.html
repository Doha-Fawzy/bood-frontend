<section class="hero-section">

  <div class="hero-bg" style="background-image: url('/assets/bood-design/images/bood-service-3.jpg');"></div>
  <div class="hero-overlay"></div>
  
  <div class="container hero-content">
    <h1 class="hero-title">
      {{ 'HERO.TITLE_1' | translate }}<br>
      {{ 'HERO.TITLE_2' | translate }}<br>
      <span class="highlight">{{ 'HERO.TITLE_HIGHLIGHT' | translate }}</span>
    </h1>
    <p class="hero-subtitle">
      {{ 'HERO.SUBTITLE_1' | translate }}<br>
      {{ 'HERO.SUBTITLE_2' | translate }}
    </p>
    
    <a routerLink="/discover" class="btn-discover">
      {{ 'HERO.DISCOVER_BTN' | translate }} 
      <span class="arrow">→</span>
    </a>
