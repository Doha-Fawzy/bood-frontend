<header class="main-header">
  <div class="container">
    <nav class="navbar">
      <!-- Logo -->
      <a routerLink="/" class="logo" aria-label="Bood Home">
        <img src="/assets/bood-design/images/logo-image.svg" alt="Bood Logo" class="logo-img" />
      </a>

      <!-- Desktop Links -->
      <ul class="nav-links">
        <li><a routerLink="/why-us">{{ 'NAV.WHY_US' | translate }}</a></li>
        <li><a routerLink="/services">{{ 'NAV.SERVICES' | translate }}</a></li>
        <li><a routerLink="/certificates">{{ 'NAV.CERTIFICATES' | translate }}</a></li>
        <li><a routerLink="/contact">{{ 'NAV.CONTACT' | translate }}</a></li>
      </ul>
      
      <!-- Language Toggle Button -->
      <button class="lang-toggle" (click)="toggleLang()">
        {{ languageService.currentLang === 'en' ? 'AR' : 'EN' }}
      </button>
    </nav>
  </div>
</header>
