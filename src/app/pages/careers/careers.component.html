<div class="careers-page">
  <!-- Hero Section -->
  <header class="career-hero">
    <div class="hero-bg" style="background-image: url('assets/bood-design/images/hero-bg.png');"></div>
    <div class="hero-overlay"></div>
    <div class="container hero-content text-center">
      <h1 class="hero-title">{{ 'CAREERS.TITLE' | translate }}</h1>
      <p class="hero-subtitle">{{ 'CAREERS.SUBTITLE' | translate }}</p>
    </div>
  </header>

  <section class="careers-section">
    <div class="careers-container">
      
      <div class="careers-content">
        <div class="gptw-info-box">
        <h2 class="gptw-heading">{{ 'CAREERS.GPTW_HEADING' | translate }}</h2>
        <p class="gptw-text">{{ 'CAREERS.GPTW_TEXT' | translate }}</p>
      </div>
    </div>

    <div class="careers-image-wrapper">
      <!-- Decorator elements for a luxurious feel -->
      <div class="image-backdrop"></div>
      <img src="assets/bood-design/images/badge.jpeg" alt="Great Place to Work" class="gptw-badge-img">
    </div>

    </div>

  </section>
</div>
