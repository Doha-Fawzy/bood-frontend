<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/assets/bood-design/images/logo-image.svg" alt="Bood Logo" class="sidebar-logo">
      <h3>Admin Panel</h3>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/services" routerLinkActive="active" class="nav-item">
        <span class="icon">📋</span> Manage Services
      </a>
      <a routerLink="/" class="nav-item">
        <span class="icon">🌐</span> View Website
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <span class="icon">🚪</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <header class="topbar">
      <h2>Dashboard Overview</h2>
      <div class="user-info">
        <span>Admin User</span>
        <div class="avatar">A</div>
      </div>
    </header>
    
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
